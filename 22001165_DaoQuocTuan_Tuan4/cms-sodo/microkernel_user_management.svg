<svg width="100%" viewBox="0 0 680 530">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="28" text-anchor="middle" font-size="15">Microkernel architecture — quản lý người dùng</text>

  <!-- Core System (center) -->
  <g class="c-purple">
    <rect x="220" y="190" width="240" height="130" rx="12" stroke-width="1"/>
    <text class="th" x="340" y="218" text-anchor="middle">Core System</text>
    <text class="ts" x="340" y="238" text-anchor="middle">UserKernel</text>
  </g>
  <!-- Inner core items -->
  <g class="c-blue">
    <rect x="234" y="248" width="98" height="28" rx="5" stroke-width="0.5"/>
    <text class="ts" x="283" y="266" text-anchor="middle">Auth Engine</text>
  </g>
  <g class="c-blue">
    <rect x="348" y="248" width="98" height="28" rx="5" stroke-width="0.5"/>
    <text class="ts" x="397" y="266" text-anchor="middle">Role Registry</text>
  </g>
  <text class="ts" x="340" y="300" text-anchor="middle">Plugin Bus</text>

  <!-- Plugin 1: OAuth -->
  <g class="node c-teal" onclick="sendPrompt('OAuth Plugin kết nối với Core như thế nào?')">
    <rect x="50" y="55" width="160" height="62" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="79" text-anchor="middle">OAuth Plugin</text>
    <text class="ts" x="130" y="97" text-anchor="middle">Google, Facebook SSO</text>
  </g>

  <!-- Plugin 2: 2FA -->
  <g class="node c-teal" onclick="sendPrompt('2FA Plugin hoạt động như thế nào trong CMS?')">
    <rect x="470" y="55" width="160" height="62" rx="8" stroke-width="0.5"/>
    <text class="th" x="550" y="79" text-anchor="middle">2FA Plugin</text>
    <text class="ts" x="550" y="97" text-anchor="middle">TOTP, SMS verify</text>
  </g>

  <!-- Plugin 3: LDAP -->
  <g class="node c-teal" onclick="sendPrompt('LDAP Plugin dùng để làm gì trong hệ thống CMS?')">
    <rect x="50" y="395" width="160" height="62" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="419" text-anchor="middle">LDAP Plugin</text>
    <text class="ts" x="130" y="437" text-anchor="middle">Active Directory sync</text>
  </g>

  <!-- Plugin 4: Audit Log -->
  <g class="node c-teal" onclick="sendPrompt('Audit Log Plugin ghi lại những gì?')">
    <rect x="470" y="395" width="160" height="62" rx="8" stroke-width="0.5"/>
    <text class="th" x="550" y="419" text-anchor="middle">Audit Log Plugin</text>
    <text class="ts" x="550" y="437" text-anchor="middle">Ghi lịch sử thao tác</text>
  </g>

  <!-- Plugin 5: Permission -->
  <g class="node c-amber" onclick="sendPrompt('Permission Plugin phân quyền theo cơ chế nào?')">
    <rect x="260" y="430" width="160" height="62" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="454" text-anchor="middle">Permission Plugin</text>
    <text class="ts" x="340" y="472" text-anchor="middle">RBAC / ABAC rules</text>
  </g>

  <!-- Arrows: plugins → core -->
  <!-- OAuth top-left to core -->
  <path d="M210 86 L280 86 L280 190" fill="none" stroke="var(--t)" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- 2FA top-right to core -->
  <path d="M470 86 L400 86 L400 190" fill="none" stroke="var(--t)" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- LDAP bottom-left to core -->
  <path d="M210 416 L280 416 L280 320" fill="none" stroke="var(--t)" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- Audit Log bottom-right to core -->
  <path d="M470 416 L400 416 L400 320" fill="none" stroke="var(--t)" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- Permission bottom-center to core -->
  <line x1="340" y1="430" x2="340" y2="320" fill="none" stroke="var(--t)" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Legend -->
  <line x1="60" y1="505" x2="95" y2="505" stroke="var(--t)" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text class="ts" x="100" y="509">Plugin interface</text>
  <rect x="210" y="498" width="14" height="14" rx="3" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="230" y="509">Extension plugin</text>
  <rect x="380" y="498" width="14" height="14" rx="3" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="400" y="509">Core plugin</text>
</svg>