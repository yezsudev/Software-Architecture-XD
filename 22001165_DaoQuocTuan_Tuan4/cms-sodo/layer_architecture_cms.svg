<svg width="100%" viewBox="0 0 680 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="30" text-anchor="middle" font-size="15">Layer architecture — quản lý bài viết</text>

  <!-- Layer 1: Presentation -->
  <g class="c-blue">
    <rect x="60" y="55" width="560" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="83" text-anchor="middle">Presentation Layer</text>
    <text class="ts" x="340" y="101" text-anchor="middle">Giao diện người dùng</text>
  </g>
  <!-- Inner boxes L1 -->
  <g class="node c-purple" onclick="sendPrompt('Mô tả chi tiết chức năng của Post Editor')">
    <rect x="90" y="110" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="162" y="131" text-anchor="middle">Post Editor (React)</text>
  </g>
  <g class="node c-purple" onclick="sendPrompt('Mô tả chi tiết chức năng của Post List View')">
    <rect x="267" y="110" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="131" text-anchor="middle">Post List View</text>
  </g>
  <g class="node c-purple" onclick="sendPrompt('Mô tả chi tiết chức năng của Preview Panel')">
    <rect x="444" y="110" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="516" y="131" text-anchor="middle">Preview Panel</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="340" y1="155" x2="340" y2="175" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="175" x2="340" y2="165" class="arr" marker-end="url(#arrow)" transform="rotate(180 340 165)"/>

  <!-- Layer 2: Business Logic -->
  <g class="c-teal">
    <rect x="60" y="180" width="560" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="208" text-anchor="middle">Business Logic Layer</text>
    <text class="ts" x="340" y="226" text-anchor="middle">Xử lý nghiệp vụ</text>
  </g>
  <g class="node c-green" onclick="sendPrompt('PostService xử lý nghiệp vụ gì?')">
    <rect x="90" y="235" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="162" y="256" text-anchor="middle">PostService</text>
  </g>
  <g class="node c-green" onclick="sendPrompt('SlugValidator làm gì trong CMS?')">
    <rect x="267" y="235" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="256" text-anchor="middle">SlugValidator</text>
  </g>
  <g class="node c-green" onclick="sendPrompt('WorkflowEngine quản lý trạng thái bài viết như thế nào?')">
    <rect x="444" y="235" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="516" y="256" text-anchor="middle">WorkflowEngine</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="340" y1="280" x2="340" y2="300" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="300" x2="340" y2="290" class="arr" marker-end="url(#arrow)" transform="rotate(180 340 290)"/>

  <!-- Layer 3: Data Access -->
  <g class="c-amber">
    <rect x="60" y="305" width="560" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="333" text-anchor="middle">Data Access Layer</text>
    <text class="ts" x="340" y="351" text-anchor="middle">Truy xuất dữ liệu</text>
  </g>
  <g class="node c-coral" onclick="sendPrompt('PostRepository thực hiện các thao tác CRUD nào?')">
    <rect x="90" y="360" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="162" y="381" text-anchor="middle">PostRepository</text>
  </g>
  <g class="node c-coral" onclick="sendPrompt('CacheManager hoạt động như thế nào trong CMS?')">
    <rect x="267" y="360" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="381" text-anchor="middle">CacheManager</text>
  </g>
  <g class="node c-coral" onclick="sendPrompt('SearchIndexer đánh index bài viết như thế nào?')">
    <rect x="444" y="360" width="145" height="34" rx="6" stroke-width="0.5"/>
    <text class="ts" x="516" y="381" text-anchor="middle">SearchIndexer</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="340" y1="405" x2="340" y2="420" class="arr" marker-end="url(#arrow)"/>

  <!-- Layer 4: Database -->
  <g class="c-gray">
    <rect x="60" y="425" width="560" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="452" text-anchor="middle">Database Layer</text>
    <text class="ts" x="340" y="470" text-anchor="middle">PostgreSQL · Redis · Elasticsearch</text>
  </g>
</svg>